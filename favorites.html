    <!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>My Favorites - VIDYA</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; padding: 0; }
        
        /* Purple Header Theme */
        .hero-banner {
            background: linear-gradient(135deg, #6e1bd6 0%, #ff2c92 100%);
            padding: 40px 20px;
            color: white;
            border-radius: 0 0 30px 30px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(110, 27, 214, 0.2);
        }

        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }
        
        /* GRID LAYOUT for Favorites */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 25px; 
            min-height: 200px; 
            justify-items: center;
        }

        /* --- PURPLE CARD DESIGN --- */
        .college-card {
            width: 100%;
            max-width: 260px;
            background: #6e1bd6;
            color: white;
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(110, 27, 214, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            text-decoration: none;
        }

        .college-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(110, 27, 214, 0.35);
        }

        .college-card img {
            width: 80px; 
            height: 80px; 
            object-fit: contain; 
            background: white; 
            padding: 8px;
            border-radius: 15px; 
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .college-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin: 0 0 8px 0;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 45px;
            display: flex; align-items: center; justify-content: center;
        }

        .college-card p {
            font-size: 0.9rem;
            opacity: 0.9;
            margin: 0 0 20px 0;
            font-weight: 400;
        }

        .view-btn {
            margin-top: auto;
            background: white;
            color: #6e1bd6;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        
        .view-btn:hover { background: #f0f0f0; transform: scale(1.05); }

        /* DELETE BUTTON */
        .btn-remove {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            width: 30px; height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
            z-index: 10;
        }
        .btn-remove:hover { background: #ff4757; transform: rotate(90deg); }

        .back-link { 
            display: inline-block;
            margin-top: 15px;
            color: rgba(255,255,255,0.9); 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 1.1rem;
        }
        .back-link:hover { color: white; text-decoration: underline; }
    </style>
