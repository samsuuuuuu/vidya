<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to VIDYA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body, html { height: 100%; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .bg-image {
            background-image: url('assets/bg.jpg'); /* Ensure you have this image */
            height: 100%; background-position: center; background-repeat: no-repeat;
            background-size: cover; position: relative;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.5); position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
        }
        .top-nav { position: absolute; top: 20px; right: 30px; z-index: 10; }
        .hero-text { text-align: center; color: white; margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-text h1 { font-size: 4rem; font-weight: 700; margin-bottom: 10px; }
        .hero-text h4 { font-size: 1.5rem; font-weight: 300; letter-spacing: 1px; color: #f0f0f0; }
        .info-card {
            background-color: rgba(255, 255, 255, 0.9); border-radius: 15px; padding: 40px;
            max-width: 800px; width: 90%; text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37); backdrop-filter: blur(4px);
        }
