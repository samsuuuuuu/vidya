<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - VIDYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #6a1b9a; 
            --border-color: #e2e8f0;
        }

        body { 
            background-image: url('assets/bg.jpg'); 
            background-size: cover;                
            background-position: center;           
            background-attachment: fixed;          
            background-repeat: no-repeat;
            
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px; 
            min-height: 100vh;
            display: flex;
            align-items: center; 
        }

        .profile-container { 
            max-width: 900px; 
            width: 100%;
            margin: 0 auto; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 50px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            backdrop-filter: blur(5px); 
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .header-section h2 { color: var(--primary-color); font-size: 30px; margin: 0; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; 
            column-gap: 40px; 
            row-gap: 25px;
        }

        .form-row label { 
            display: block; 
            font-weight: 600; 
            margin-bottom: 8px; 
            font-size: 14px; 
            color: #334155; 
        }

        input[type="text"], input[type="email"], select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            font-size: 15px;
            background: #fff;
            box-sizing: border-box; 
        }

        /* DISABLED FIELD STYLING */
        input:disabled {
            background-color: #f1f5f9; /* Grey background */
            color: #64748b;            /* Grey text */
            cursor: not-allowed;
            border-color: #cbd5e1;
        }

        .full-width { grid-column: span 2; }

        .btn-container {
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button.btn { 
            background: var(--primary-color); 
            color: #fff; 
            padding: 12px 40px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s;
            font-size: 16px;
        }

        button.btn:hover { transform: translateY(-2px); background: #5815ab; }
