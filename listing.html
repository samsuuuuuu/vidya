<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Colleges - VIDYA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4338ca;
            --accent: #ec4899;
            --gradient: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            --bg-light: #f9f9fb;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
        }

        body {
            background-color: var(--bg-light);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-dark);
        }

        /* --- NAVBAR --- */
        .navbar {
            background: var(--gradient) !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 15px 0;
            position: sticky; top: 0; z-index: 1000;
        }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; color: white !important; letter-spacing: 1px; }
        .nav-link { color: rgba(255, 255, 255, 0.9) !important; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { color: white !important; transform: translateY(-1px); }

        /* --- MAIN LAYOUT (2 Columns) --- */
        .listing-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
            display: flex;
            gap: 30px;
            align-items: flex-start; /* Keeps sidebar sticky */
        }

        /* --- NEW FLOATING FILTER SIDEBAR --- */
        .filter-sidebar {
            width: 300px;
            flex-shrink: 0;
            background: white;
            border-radius: 16px;
            position: sticky; 
            top: 90px; /* Offset for navbar */
            height: calc(100vh - 110px); 
            overflow-y: auto; 
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.1); 
            border: 1px solid rgba(255,255,255,0.8);
            display: flex; flex-direction: column;
            z-index: 900;
        }

        /* Filter Header */
        .filter-header {
            background: var(--gradient);
            color: white;
            padding: 18px 20px;
            border-radius: 16px 16px 0 0;
            display: flex; justify-content: space-between; align-items: center;
        }
